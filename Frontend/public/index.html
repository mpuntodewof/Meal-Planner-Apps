<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />

    <title>React App</title>

    <!-- Landing Page Style -->
    <!-- CSS -->
    <!-- favicon -->
    <link rel="shortcut icon" type="image/png" href="./assets/img/favicon.png">
    <!-- google font: preconnect + non-blocking load (print->all swap) so fonts don't block first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap" rel="stylesheet">
    </noscript>
    <!-- fontawesome -->
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/all.min.css">
    <!-- bootstrap -->
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/bootstrap/css/bootstrap.min.css">
    <!-- owl carousel -->
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/owl.carousel.css">
    <!-- magnific popup -->
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/magnific-popup.css">
    <!-- animate css -->
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/animate.css">
    <!-- mean menu css -->
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/meanmenu.min.css">
    <!-- main style -->
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/main.css">
    <!-- responsive -->
    <link rel="stylesheet" href="%PUBLIC_URL%/assets/css/responsive.css">
    <!-- End Landing Page Style -->
    
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Landing Page  -->
    <!-- Legacy jQuery theme plugins: `defer` so they download in parallel and -->
    <!-- run after the DOM is ready (preserving load order) instead of blocking first paint. -->
    <!-- jquery -->
    <script defer src="%PUBLIC_URL%/assets/js/jquery-1.11.3.min.js"></script>
    <!-- bootstrap -->
    <script defer src="%PUBLIC_URL%/assets/bootstrap/js/bootstrap.min.js"></script>
    <!-- count down -->
    <script defer src="%PUBLIC_URL%/assets/js/jquery.countdown.js"></script>
    <!-- isotope -->
    <script defer src="%PUBLIC_URL%/assets/js/jquery.isotope-3.0.6.min.js"></script>
    <!-- waypoints -->
    <script defer src="%PUBLIC_URL%/assets/js/waypoints.js"></script>
    <!-- owl carousel -->
    <script defer src="%PUBLIC_URL%/assets/js/owl.carousel.min.js"></script>
    <!-- magnific popup -->
    <script defer src="%PUBLIC_URL%/assets/js/jquery.magnific-popup.min.js"></script>
    <!-- mean menu -->
    <script defer src="%PUBLIC_URL%/assets/js/jquery.meanmenu.min.js"></script>
    <!-- sticker js -->
    <script defer src="%PUBLIC_URL%/assets/js/sticker.js"></script>
    <!-- main js -->
    <script defer src="%PUBLIC_URL%/assets/js/main.js"></script>
    <!-- End Landing Page -->
     
  </body>
</html>
