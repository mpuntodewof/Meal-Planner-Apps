services:

  # ── MySQL Database ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: foodfest
    ports:
      - "3307:3306"   # host 3307 → container 3306 (avoids conflict with local MySQL)
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── ASP.NET Core API ─────────────────────────────────────────────────
  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5128:5128"
    environment:
      # Override appsettings.json — point at the 'db' service on the Docker network
      - ConnectionStrings__DbConnection=Server=db;Port=3306;Database=foodfest;User Id=root;Password=root;
      # Tell Kestrel which URL to bind
      - ASPNETCORE_URLS=http://+:5128
      - ASPNETCORE_ENVIRONMENT=Production
      # AI provider config — values come from the gitignored .env file; never
      # hardcode secrets here. The services target any OpenAI-compatible provider:
      #   OpenAI__ApiKey  - provider API key (OpenAI, Groq, Gemini, ...)
      #   OpenAI__BaseUrl - provider endpoint; empty = OpenAI. Groq is
      #                     https://api.groq.com/openai/v1
      #   OpenAI__Model   - model id, e.g. gpt-4o-mini (OpenAI) or
      #                     llama-3.3-70b-versatile (Groq)
      - OpenAI__ApiKey=${OpenAI__ApiKey:-}
      - OpenAI__BaseUrl=${OpenAI__BaseUrl:-}
      - OpenAI__Model=${OpenAI__Model:-gpt-4o-mini}
      # Ordered, comma-separated fallback chain (first = primary). If set, overrides
      # OpenAI__Model. On 429/402/5xx the next model is tried automatically.
      - OpenAI__Models=${OpenAI__Models:-}
      # OpenRouter attribution (optional; shown in OpenRouter dashboard/rankings).
      - OpenAI__Referer=${OpenAI__Referer:-}
      - OpenAI__Title=${OpenAI__Title:-}
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mysql_data:
