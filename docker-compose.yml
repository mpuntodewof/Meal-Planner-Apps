version: '3.8'

services:

  # ── MySQL Database ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: foodfest-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: foodfest
    ports:
      - "3307:3306"   # host 3307 → container 3306 (avoids conflict with local MySQL)
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── ASP.NET Core API ─────────────────────────────────────────────────
  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: foodfest-api
    restart: always
    ports:
      - "5128:5128"
    environment:
      # Override appsettings.json — point at the 'db' service on the Docker network
      - ConnectionStrings__DbConnection=Server=db;Port=3306;Database=foodfest;User Id=root;Password=root;
      # Tell Kestrel which URL to bind
      - ASPNETCORE_URLS=http://+:5128
      - ASPNETCORE_ENVIRONMENT=Production
      # OpenAI key for the AI recipe generator — value comes from the gitignored .env file
      # (docker compose substitutes ${OpenAI__ApiKey}); never hardcode the key here.
      - OpenAI__ApiKey=${OpenAI__ApiKey:-}
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: foodfest-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mysql_data:
